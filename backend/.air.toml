[build]
  cmd = "go build -o ./tmp/main ./cmd/api"
  bin = "./tmp/main"
  include_dir = ["cmd", "internal"]
  include_ext = ["go", "toml", "env"]
  exclude_dir = ["tmp", "vendor", "node_modules", ".git"]
  
  delay = 500
  stop_on_error = true
  log = "build_errors.log"

[log]
  main_only = false
  time = true